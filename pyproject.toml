[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# Keep CI focused on high-signal syntax/pyflakes/pycodestyle checks that pass today.
# TODO: enable after cleanup: I, UP, B, C4, SIM.
select = ["E4", "E7", "E9", "F", "W"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# No per-file ignores are currently needed for tests/** or .github/scripts/**.
